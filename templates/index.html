<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>6DofRobot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="p-4 h-screen flex flex-col gap-4">
    <div class="control-panel p-3 flex items-center justify-center gap-2">
            <button id="settings-btn" class="nav-btn flex items-center gap-2">
                <img src="{{ url_for('static', filename='icons/settings.png') }}" class="w-4 h-4" alt="Settings">
                Settings
            </button>
            <button id="home-btn" class="nav-btn flex items-center gap-2">
                <img src="{{ url_for('static', filename='icons/home.png') }}" class="w-4 h-4" alt="Home">
                Home XYZ
            </button>
    </div>

    <div class="flex flex-grow gap-4 min-h-0">
        <div class="control-panel w-2/5 p-6">
                <h2 class="text-slate-400 text-center text-xs font-bold uppercase mb-3">Forward Mode</h2>
                <div id="sliders-container" class="space-y-4"></div>

                <h2 class="text-slate-400 text-center text-xs font-bold uppercase mb-3">Inverse Mode</h2>
                <div class="grid grid-cols-2 gap-3 p-4">
                    <button onmousedown="startJog('x', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-indigo-600 text-white font-bold py-3 rounded shadow-lg transition-all">X +</button>
                    <button onmousedown="startJog('x', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-indigo-600 text-white font-bold py-3 rounded shadow-lg transition-all">X -</button>

                    <button onmousedown="startJog('y', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-emerald-600 text-white font-bold py-3 rounded shadow-lg transition-all">Y +</button>
                    <button onmousedown="startJog('y', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-emerald-600 text-white font-bold py-3 rounded shadow-lg transition-all">Y -</button>

                    <button onmousedown="startJog('z', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-red-600 text-white font-bold py-3 rounded shadow-lg transition-all">Z +</button>
                    <button onmousedown="startJog('z', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-red-600 text-white font-bold py-3 rounded shadow-lg transition-all">Z -</button>
                </div>
                <div class="flex items-center gap-4 mb-4 bg-slate-100 p-2 rounded">
                    <span class="text-xs font-bold uppercase">Speed:</span>
                    <button onclick="changeSpeed(-0.02)" class="px-2 bg-white border rounded">-</button>
                    <span id="speed-display" class="font-mono font-bold text-indigo-600">0.05</span>
                    <button onclick="changeSpeed(0.02)" class="px-2 bg-white border rounded">+</button>
                </div>
        </div>
        <div class="control-panel flex-grow relative">
            <div id="visualization-canvas" class="w-full h-full"></div>
        </div>
    </div>

    <div class="h-1/4 flex gap-4">
        <div class="control-panel flex-grow p-4 flex flex-col">
            <div id="log-field" class="flex-grow p-3 overflow-y-auto whitespace-pre-wrap"></div>
        </div>
        <div class="inverse-traj flex-col control-panel w-3/5 p-4 flex">
            <!-- NAGŁÓWEK I WYBÓR TRYBU -->
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-sm font-bold text-indigo-900 uppercase">Trajectory Panel</h3>
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <label class="flex items-center gap-1 px-3 py-1 text-xs cursor-pointer rounded-md has-[:checked]:bg-white has-[:checked]:shadow-sm transition-all">
                        <input type="radio" name="traj-mode" value="ab" class="hidden" checked onclick="toggleTrajMode('ab')">
                        A → B
                    </label>
                    <label class="flex items-center gap-1 px-3 py-1 text-xs cursor-pointer rounded-md has-[:checked]:bg-white has-[:checked]:shadow-sm transition-all">
                        <input type="radio" name="traj-mode" value="teach" class="hidden" onclick="toggleTrajMode('teach')">
                        Teaching
                    </label>
                </div>
            </div>

            <!-- TRYB A -> B (Widoczny domyślnie) -->
            <div id="section-ab" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <span class="text-[10px] font-bold text-indigo-500 uppercase">Point A (Start)</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="number" id="start-x" value="1.2" step="0.1" class="p-1.5 rounded border text-xs w-full">
                            <input type="number" id="start-y" value="0.0" step="0.1" class="p-1.5 rounded border text-xs w-full">
                            <input type="number" id="start-z" value="1.5" step="0.1" class="p-1.5 rounded border text-xs w-full">
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-indigo-500 uppercase">Point B (End)</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="number" id="target-x" value="1.5" step="0.1" class="p-1.5 rounded border text-xs w-full">
                            <input type="number" id="target-y" value="0.5" step="0.1" class="p-1.5 rounded border text-xs w-full">
                            <input type="number" id="target-z" value="1.8" step="0.1" class="p-1.5 rounded border text-xs w-full">
                        </div>
                    </div>
                </div>
            </div>

            <!-- TRYB TEACHING -->
            <div id="section-teach" class="hidden flex-grow flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold text-emerald-600 uppercase">Points Sequence</span>
                    <div class="flex gap-2">
                        <button onclick="recordWaypoint()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded text-[10px] font-bold transition-colors">
                            + RECORD CURRENT
                        </button>
                        <button onclick="clearWaypoints()" class="bg-red-50 text-red-600 px-3 py-1 rounded text-[10px] hover:bg-red-100">
                            CLEAR ALL
                        </button>
                    </div>
                </div>

                <div id="waypoints-list" class="flex-grow overflow-y-auto bg-slate-50 border-2 border-dashed border-slate-200 rounded-lg p-2 text-[11px] font-mono min-h-[80px]">
                    <div class="text-slate-400 text-center py-4">No points recorded. Move robot and click Record.</div>
                </div>

                <div class="mt-auto pt-2 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2 text-xs font-bold cursor-pointer">
                            <input type="checkbox" id="loop-enable" class="w-3 h-3 accent-indigo-600">
                            LOOP MODE
                        </label>
                        <div class="flex items-center gap-2 border-l pl-4">
                            <span class="text-[10px] uppercase text-slate-500">Cycles:</span>
                            <input type="number" id="loop-count" value="1" min="1" class="w-10 border rounded text-center text-xs p-1">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="control-panel w-60 p-4 flex flex-col gap-2">
            <button class="btn-start flex items-center justify-center gap-2 flex-grow" onclick="executeGlobalStart()">
                <img src="{{ url_for('static', filename='icons/play.png') }}" class="w-6 h-6" alt="Start">
                Start
            </button>
            <button class="btn-pause flex items-center justify-center gap-2 flex-grow" onclick="togglePause()">
                <img src="{{ url_for('static', filename='icons/pause.png') }}" class="w-6 h-6" alt="Pause">
                Pause
            </button>
            <button class="btn-stop flex items-center justify-center gap-2 flex-grow" onclick="stopProgram()">
                <img src="{{ url_for('static', filename='icons/stop.png') }}" class="w-6 h-6" alt="Stop">
                Stop
            </button>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/visualizer.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

    <div id="settings" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-[400px] overflow-hidden border border-slate-200">

            <div class="bg-slate-50 p-4 border-b flex justify-between items-center">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-widest">Robot Configuration</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>


            <div id="config-inputs" class="p-6 space-y-3 max-h-[60vh] overflow-y-auto">
                <!-- Wypełniane przez JavaScript -->
            </div>


            <div class="p-4 bg-slate-50 border-t flex gap-3">
                <button onclick="closeSettings()" class="flex-1 px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-200 rounded-lg transition-colors">
                    CANCEL
                </button>
                <button onclick="saveSettings()" class="flex-1 px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-lg shadow-indigo-200 transition-all">
                    SAVE AND RESTART
                </button>
            </div>
        </div>
    </div>



</body>
</html>
