<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>6DofRobot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="p-4 h-screen flex flex-col gap-4">
    <div class="control-panel p-3 flex items-center justify-center gap-2">
            <button id="settings-btn" class="nav-btn flex items-center gap-2">
                <img src="{{ url_for('static', filename='icons/settings.png') }}" class="w-4 h-4" alt="Settings">
                Settings
            </button>
            <button id="home-btn" class="nav-btn flex items-center gap-2">
                <img src="{{ url_for('static', filename='icons/home.png') }}" class="w-4 h-4" alt="Home">
                Home XYZ
            </button>
    </div>

    <div class="flex flex-grow gap-4 min-h-0">
        <div class="control-panel w-2/5 p-6">
                <h2 class="text-slate-400 text-center text-xs font-bold uppercase mb-3">Forward Mode</h2>
                <div id="sliders-container" class="space-y-4"></div>

                <h2 class="text-slate-400 text-center text-xs font-bold uppercase mb-3">Inverse Mode</h2>
                <div class="grid grid-cols-2 gap-3 p-4">
                    <button onmousedown="startJog('x', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-indigo-600 text-white font-bold py-3 rounded shadow-lg transition-all">X +</button>
                    <button onmousedown="startJog('x', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-indigo-600 text-white font-bold py-3 rounded shadow-lg transition-all">X -</button>

                    <button onmousedown="startJog('y', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-emerald-600 text-white font-bold py-3 rounded shadow-lg transition-all">Y +</button>
                    <button onmousedown="startJog('y', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-emerald-600 text-white font-bold py-3 rounded shadow-lg transition-all">Y -</button>

                    <button onmousedown="startJog('z', 1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-red-600 text-white font-bold py-3 rounded shadow-lg transition-all">Z +</button>
                    <button onmousedown="startJog('z', -1)" onmouseup="stopJog()" onmouseleave="stopJog()" class="bg-slate-700 hover:bg-red-600 text-white font-bold py-3 rounded shadow-lg transition-all">Z -</button>
                </div>
                <div class="flex items-center gap-4 mb-4 bg-slate-100 p-2 rounded">
                    <span class="text-xs font-bold uppercase">Speed:</span>
                    <button onclick="changeSpeed(-0.02)" class="px-2 bg-white border rounded">-</button>
                    <span id="speed-display" class="font-mono font-bold text-indigo-600">0.05</span>
                    <button onclick="changeSpeed(0.02)" class="px-2 bg-white border rounded">+</button>
                </div>
        </div>
        <div class="control-panel flex-grow relative">
            <div id="visualization-canvas" class="w-full h-full"></div>
        </div>
    </div>

    <div class="h-1/4 flex gap-4">
        <div class="control-panel flex-grow p-4 flex flex-col">
            <div id="log-field" class="flex-grow p-3 overflow-y-auto whitespace-pre-wrap"></div>
        </div>
        <div class="inverse-traj flex-col control-panel w-3/5 p-4 flex">

            <!-- HEADER -->
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-bold text-indigo-900 uppercase tracking-wider">
                    Trajectory Panel
                </h3>

                <div class="flex gap-4">
                    <label class="flex items-center gap-1 text-xs cursor-pointer">
                        <input type="radio" name="traj-mode" value="ab" checked onclick="toggleTrajMode('ab')">
                        A → B
                    </label>
                    <label class="flex items-center gap-1 text-xs cursor-pointer">
                        <input type="radio" name="traj-mode" value="teach" onclick="toggleTrajMode('teach')">
                        Teaching
                    </label>
                </div>
            </div>

            <!-- LABEL LINE -->
            <div class="flex justify-between items-center mb-2 text-[10px] font-bold text-indigo-500 uppercase">
                <span>Point A (start)</span>
                <span>Point B (end)</span>
            </div>

            <!-- COORDINATES -->
            <div class="flex gap-4 mb-2">
                <!-- A -->
                <div class="grid grid-cols-3 gap-2 flex-1">
                    <input type="number" id="start-x" value="1.2" placeholder="X" class="p-2 rounded border text-sm">
                    <input type="number" id="start-y" value="0.0" placeholder="Y" class="p-2 rounded border text-sm">
                    <input type="number" id="start-z" value="1.5" placeholder="Z" class="p-2 rounded border text-sm">
                </div>

                <!-- B -->
                <div class="grid grid-cols-3 gap-2 flex-1">
                    <input type="number" id="target-x" value="1.5" placeholder="X" class="p-2 rounded border text-sm">
                    <input type="number" id="target-y" value="0.5" placeholder="Y" class="p-2 rounded border text-sm">
                    <input type="number" id="target-z" value="1.8" placeholder="Z" class="p-2 rounded border text-sm">
                </div>

            </div>

            <div class="flex gap-4 mb-4">
                <!-- A -->
                <div class="grid grid-cols-3 gap-2 flex-1">
                    <input type="number" id="track-x" value="1.2" placeholder="X" class="p-2 rounded border text-sm">
                    <input type="number" id="track-y" value="0.0" placeholder="Y" class="p-2 rounded border text-sm">
                    <input type="number" id="track-z" value="1.5" placeholder="Z" class="p-2 rounded border text-sm">
                </div>

                <!-- RECORD BUTTON -->
                <button onclick="recordWaypoint()"
                    class="bg-red-500 hover:bg-red-600 text-white px-4 rounded text-xs font-bold whitespace-nowrap">
                    RECORD
                </button>
            </div>

            <!-- TEACH SECTION -->
            <div id="teach-section" class="hidden border-t pt-3 mb-4">
                <div class="flex gap-2 mb-2">
                    <button onclick="clearWaypoints()" class="bg-red-100 text-red-600 px-3 py-2 rounded text-xs">
                        Clear
                    </button>
                </div>

                <div id="waypoints-list"
                    class="max-h-32 overflow-y-auto bg-white border rounded p-2 text-[10px] font-mono">
                    No recorded points...
                </div>
            </div>

            <!-- LOOP -->
            <div class="flex justify-between items-center p-2 bg-white rounded border">
                <label class="flex items-center gap-2 text-xs font-bold">
                    <input type="checkbox" id="loop-enable"> LOOP
                </label>

                <div class="flex items-center gap-2">
                    <span class="text-[10px]">Iterations:</span>
                    <input type="number" id="loop-count" value="1" min="1"
                        class="w-14 border rounded text-center text-xs">
                </div>
            </div>

        </div>
        <div class="control-panel w-60 p-4 flex flex-col gap-2">
            <button class="btn-start flex items-center justify-center gap-2 flex-grow" onclick="executeGlobalStart()">
                <img src="{{ url_for('static', filename='icons/play.png') }}" class="w-6 h-6" alt="Start">
                Start
            </button>
            <button class="btn-pause flex items-center justify-center gap-2 flex-grow">
                <img src="{{ url_for('static', filename='icons/pause.png') }}" class="w-6 h-6" alt="Pause">
                Pause
            </button>
            <button class="btn-stop flex items-center justify-center gap-2 flex-grow">
                <img src="{{ url_for('static', filename='icons/stop.png') }}" class="w-6 h-6" alt="Stop">
                Stop
            </button>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/visualizer.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
